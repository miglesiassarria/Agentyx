# rustfmt config — applied to all crates in the workspace.
# Only stable-channel options are listed here; nightly-only
# options are intentionally omitted since CI runs on stable.

edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
