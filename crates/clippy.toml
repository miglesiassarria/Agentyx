# clippy config — project-level settings only.
#
# Lint levels (warn/deny) live in [workspace.lints] in the
# workspace Cargo.toml and are inherited by each crate via
# `[lints] workspace = true`.
#
# This file keeps settings that aren't lint levels
# (avoid-breaking-exported-api, msrv, etc.).

avoid-breaking-exported-api = false
msrv = "1.80"
