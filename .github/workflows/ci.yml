name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 3
  # GitHub is forcing all actions to Node 24 in June 2026. We
  # opt in early so we silence the deprecation warnings on the
  # few actions that still ship on Node 20 (actions/cache@v4,
  # dtolnay/rust-toolchain). The 1.x setup-bun action was the
  # worst offender; we've moved to oven-sh/setup-bun@v2 which
  # already runs on Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------- Rust --------

  rust-fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: rustfmt
        working-directory: crates
        run: cargo fmt --all -- --check

  rust-clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-rust-${{ hashFiles('crates/Cargo.lock') }}
      - name: Install Tauri system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev
      - name: clippy
        working-directory: crates
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-test:
    name: cargo test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust deps
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-rust-${{ hashFiles('crates/Cargo.lock') }}
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libsqlite3-dev
      - name: cargo test
        working-directory: crates
        run: cargo test --workspace --all-features

  rust-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-rust-${{ hashFiles('crates/Cargo.lock') }}
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny
        working-directory: crates
        run: cargo deny check

  rust-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-rust-${{ hashFiles('crates/Cargo.lock') }}
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        working-directory: crates
        # `informational_warnings` for `unmaintained` and `unsound`
        # is configured in `crates/.cargo/audit.toml`. Real CVEs and
        # yanked crates still fail the build. Re-evaluate the
        # advisory policy when bumping Tauri/wry (they pull in
        # several transitive `unic-*` and `proc-macro-error`
        # unmaintained warnings).
        run: cargo audit --deny warnings

  # -------- Frontend --------

  ui-install:
    name: UI install (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

  ui-typecheck:
    name: UI typecheck
    needs: ui-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - working-directory: ui
        run: bun run typecheck

  ui-lint:
    name: UI lint
    needs: ui-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - working-directory: ui
        run: bun run lint

  ui-format:
    name: UI format
    needs: ui-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - working-directory: ui
        run: bun run format:check

  ui-test:
    name: UI test (vitest)
    needs: ui-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - working-directory: ui
        run: bun run test

  ui-build:
    name: UI build
    needs: ui-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - working-directory: ui
        run: bun run build

  # -------- Docs (specs/) --------

  docs-lint:
    name: Specs consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate STATUS.md structure
        run: |
          if ! grep -q "## 🟡 Draft" specs/STATUS.md; then
            echo "ERROR: missing Draft section" >&2
            exit 1
          fi
          if ! grep -q "## 🟢 Approved" specs/STATUS.md; then
            echo "ERROR: missing Approved section" >&2
            exit 1
          fi
      - name: Check for forbidden patterns
        run: |
          if grep -rn "TODO.*implementar" specs/features/ 2>/dev/null; then
            echo "ERROR: 'TODO implementar' found in features (forbidden per AGENTS.md §17)" >&2
            exit 1
          fi
      - name: Validate ROADMAP.md IDs
        run: |
          for f in specs/features/F0*.md; do
            [ -f "$f" ] || continue
            id=$(basename "$f" .md | cut -d- -f1)
            if ! grep -q "$id" specs/features/ROADMAP.md; then
              echo "ERROR: feature $id not in ROADMAP.md" >&2
              exit 1
            fi
          done
